<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta -->
    <title>{{ page.title | default: site.title | default: 'Digital Dichotomy Research' }}</title>
    <meta name="description" content="{{ page.description | default: site.description | default: 'Academic research on biofield surveillance infrastructure, cognitive sovereignty, and defensive countermeasures.' }}">
    <meta name="keywords" content="{{ page.keywords | default: site.keywords | default: 'surveillance, biometric privacy, cognitive sovereignty, patent analysis, Fin Nyx' }}">
    <meta name="author" content="Fin Nyx">
    <meta name="robots" content="index, follow">

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

    <!-- Open Graph -->
    <meta property="og:type" content="{{ page.og_type | default: 'website' }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:image" content="{{ page.image | default: '/logo.png' | absolute_url }}">
    <meta property="og:site_name" content="Digital Dichotomy">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ page.image | default: '/logo.png' | absolute_url }}">

    <!-- Theme Color -->
    <meta name="theme-color" content="#dc2626">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.0"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#dc2626', 600: '#b91c1c' },
                        secondary: { 500: '#f59e0b', 600: '#d97706' }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">

    <!-- Additional Head Content -->
    {{ content | extract_option:'head' }}
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen flex flex-col">
    <!-- Reading Progress Bar -->
    <div id="progress-bar">
        <div id="progress-fill" style="width: 0%"></div>
    </div>

    <!-- Header with Navigation -->
    {% include header.html %}

    <!-- Main Content -->
    <main class="flex-1">
        {{ content }}
    </main>

    <!-- Footer -->
    {% include footer.html %}

    <!-- Scripts -->
    {% include scripts.html %}
</body>
</html>
